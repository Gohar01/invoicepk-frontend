<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background: rounded square in brand green -->
  <rect width="64" height="64" rx="14" fill="#00C16A"/>

  <!-- Invoice/document icon in white -->
  <g fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Document outline -->
    <path d="M20 12 H38 L46 20 V52 H20 Z" fill="#ffffff" fill-opacity="0.15"/>
    <path d="M20 12 H38 L46 20 V52 H20 Z"/>
    <!-- Folded corner -->
    <path d="M38 12 V20 H46"/>
    <!-- Text lines representing invoice items -->
    <line x1="25" y1="28" x2="41" y2="28"/>
    <line x1="25" y1="34" x2="41" y2="34"/>
    <line x1="25" y1="40" x2="35" y2="40"/>
  </g>

  <!-- Checkmark badge (bottom right) indicating "paid/done" -->
  <circle cx="47" cy="47" r="10" fill="#ffffff"/>
  <path d="M43 47 L46 50 L52 44" stroke="#00C16A" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
